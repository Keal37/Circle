<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIRCLE</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ===================== -->
  <!-- LOGIN -->
  <!-- ===================== -->
  <div id="login" style="display:flex; height:100vh; flex-direction:column; justify-content:center; align-items:center; gap:10px; background:#0f0f0f; color:white;">
    <h2>DIGI LOGIN</h2>

    <input id="digiId" placeholder="Enter Digi ID..." style="padding:12px; width:220px; border-radius:8px; border:none;" />

    <button onclick="login()" style="padding:12px 18px; border:none; border-radius:8px; background:#3a7afe; color:white;">
      Continue
    </button>
  </div>

  <!-- ===================== -->
  <!-- DASHBOARD -->
  <!-- ===================== -->
  <div id="dashboard" style="display:none; height:100vh; flex-direction:column; justify-content:center; align-items:center; gap:10px; background:#0f0f0f; color:white;">

    <h2>CIRCLE</h2>

    <input id="newCircle" placeholder="Enter circle name..." style="padding:12px; width:220px; border-radius:8px; border:none;" />

    <button onclick="openCircle()" style="padding:12px 18px; border:none; border-radius:8px; background:#3a7afe; color:white;">
      Enter Circle
    </button>

    <!-- Recent circles -->
    <div id="circleList" style="margin-top:20px; width:220px;"></div>

  </div>

  <!-- ===================== -->
  <!-- CHAT -->
  <!-- ===================== -->
  <div class="chat-wrapper" style="display:none;">

    <div class="top-bar">CIRCLE</div>

    <div id="messages" class="messages"></div>

    <div class="input-bar">
      <input id="msg" placeholder="Type message..." />
      <button onclick="send()">Send</button>
    </div>

  </div>

  <!-- SOCKET -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <!-- APP -->
  <script src="app.js"></script>

</body>
</html>
