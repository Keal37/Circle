<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>CIRCLE Chat</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- -------------------- -->
  <!-- CHAT WRAPPER -->
  <!-- -------------------- -->
  <div class="chat-wrapper">

    <!-- TOP BAR -->
    <div class="top-bar">
      CIRCLE
    </div>

    <!-- -------------------- -->
    <!-- JOIN / CIRCLE INPUT -->
    <!-- -------------------- -->
    <div style="padding:10px; display:flex; gap:8px; background:#111;">
      <input
        id="circleInput"
        placeholder="Enter circle name..."
        style="flex:1; padding:10px; border:none; border-radius:8px;"
      />

      <button onclick="joinCircle()" style="padding:10px; border:none; border-radius:8px; background:#3a7afe; color:white;">
        Join
      </button>
    </div>

    <!-- -------------------- -->
    <!-- MESSAGES -->
    <!-- -------------------- -->
    <div id="messages" class="messages"></div>

    <!-- -------------------- -->
    <!-- INPUT BAR -->
    <!-- -------------------- -->
    <div class="input-bar">

      <input
        id="msg"
        placeholder="Type a message..."
      />

      <button onclick="send()">
        Send
      </button>

    </div>

  </div>

  <!-- SOCKET.IO -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <!-- APP LOGIC -->
  <script src="app.js"></script>

</body>
</html>
