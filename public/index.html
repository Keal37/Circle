<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CIRCLE</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- =========================
     HOME SCREEN
========================= -->
<div id="home" class="home">

  <h2>CIRCLE</h2>

  <p>Select or create a circle</p>

  <div class="circle-list" id="circleList"></div>

  <div class="create-circle">
    <input id="newCircle" placeholder="Create circle..." />
    <button onclick="createCircle()">+</button>
  </div>

</div>

<!-- =========================
     CHAT SCREEN
========================= -->
<div id="chat" class="chat hidden">

  <div class="top-bar">
    <div id="currentCircleName">#circle</div>
    <button onclick="backHome()">Exit</button>
  </div>

  <div id="messages" class="messages"></div>

  <div class="input-bar">
    <input id="msg" type="text" placeholder="Type message..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<!-- =========================
     USERS PANEL
========================= -->
<div id="users" class="users-panel"></div>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<!-- APP LOGIC -->
<script src="app.js"></script>

</body>
</html>
