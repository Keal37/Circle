<!DOCTYPE html>
<html>
<head>
  <title>CIRCLE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>⚡ CIRCLE</h1>

  <input id="circleInput" placeholder="Enter Circle name" />

  <button onclick="joinCircle()">Join Circle</button>

</div>

<script>
function joinCircle() {
  const circle = document.getElementById("circleInput").value.trim().toLowerCase();

  if (!circle) return;

  // save circle for chat page
  localStorage.setItem("circle", circle);

  // go to chat page
  window.location.href = "/chat.html";
}
</script>

</body>
</html>
